<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Project: Library</title>
</head>

<body>
    <div class="header">
        <div class="header-title">
            <H1>Project: Library</H1>
        </div>
        <div class="header-form">
            <!-- Formulario -->
            <form class="book-form" action="" method="post" required>
                <label for="POST-name">Name:</label>
                <input type="text" name="name" id="POST-name" required>

                <label for="POST-author">Author:</label>
                <input type="text" name="author" id="POST-author" required>

                <label for="POST-pages">Pages:</label>
                <input type="number" name="pages" id="POST-pages" min="0" max="9999" step="1" required>
                <label for="POST-status">Status:</label>
                <input type="text" name="status" id="POST-status" required>

                <input type="submit" value="Submit">
            </form>
        </div>
    </div>
    <div class="main-content"></div>

    <!-- Como buena practica siempre dejar la etiqueta de Script al Final -->
     <script src="library.js"></script>
</body>

</html>
